<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kakao-watch</title>
    <link rel="stylesheet" href="/frontend/src/style.css">
  </head>
  <body class="flex flex-col min-h-screen max-h-screen max-w-full">
    <div id="app"></div>
    <header class="flex flex-row bg-bg-primary gap-5  justify-between border py-5 px-2 min-lg:px-12 border-text-tertiary">
      <h1 class="text-contrast text-[30px] font-bold max-md:invisible max-md:absolute">Kakao-watch</h1>
      <h1 class="text-contrast text-[30px] font-bold min-md:invisible min-md:absolute">KW</h1>
      <input type="text" class="flex-1 border rounded-[8px] border-text-tertiary text-text-primary py-2 px-5" placeholder="Поиск">
      <div class="flex ">
        <a href="./src/pages/sign-in/sign-in.html" class="border border-text-tertiary rounded-l-[8px] text-center content-center px-5 bg-bg-tertiary hover:bg-bg-hover max-lg:rounded-[8px]">ВОЙТИ</a>
        <a href="./src/pages/sign-up/sign-up.html" class="border border-text-secondary rounded-r-[8px] text-center content-center px-5 bg-contrast hover:bg-contrast-hover text-text-inverse max-lg:invisible max-lg:absolute">РЕГИСТРАЦИЯ</a>
      </div>
    </header>
    <main class="flex flex-row flex-1 max-[1000px]:flex-col">

      <div class="flex flex-1">
        <div class="flex flex-col border-r border-b border-text-tertiary p-5 gap-5 w-full transition-all">
            <div class="bg-bg-hover w-full h-160">
                <video src="" ></video>
            </div>
            <section class="flex flex-col gap-5">
                <h2 class="font-black text-[25px]">Название</h2>
                <div class="flex">
                    <a href="" class="flex gap-5">
                        <div class="bg-black w-15 h-15">
                            <img src="" alt="">
                        </div>
                        <p class="font-bold text-[25px] self-center">
                            Название канала
                        </p>
                    </a>
                </div>
                <p>Описание</p>

            </section>
        </div>
      </div>

      <div class="flex w-100 max-[1000px]:w-full">
        <div class="flex flex-col gap-3 w-full transition-all">
            <p class="font-bold text-[25px] self-center my-2">
                Другие видео
            </p>
            <div class="flex flex-col border-text-tertiary border-t p-5 gap-3 w-full transition-all">
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
                <div class="flex border border-text-tertiary min-h-50"></div>
            </div>
        </div>
      </div>
    </main>
    <script type="module" src="videoPlayer.ts"></script>
  </body>
</html>
